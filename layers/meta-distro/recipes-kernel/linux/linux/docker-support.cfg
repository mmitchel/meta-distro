# Kernel configuration fragment for Docker support
# Includes cgroups v2, namespaces, and container runtime requirements

# Control Groups (cgroups) v2 - Unified hierarchy
CONFIG_CGROUPS=y

# Disable cgroups v1 to prefer cgroups v2 unified hierarchy
# This ensures systemd and Docker use cgroups v2 by default
# CONFIG_CGROUP_SCHED is not set

# Enable cgroups v2 controllers
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_BPF=y

# Memory control group (memcg) for cgroups v2
CONFIG_MEMCG=y
CONFIG_MEMCG_KMEM=y

# Block IO controller for cgroups v2
CONFIG_BLK_CGROUP=y
CONFIG_BLK_DEV_THROTTLING=y

# Namespaces support
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y
CONFIG_USER_NS=y

# IPv4 support for Docker
CONFIG_INET=y
CONFIG_IP_MULTICAST=y
CONFIG_IP_ADVANCED_ROUTER=y
CONFIG_IP_MULTIPLE_TABLES=y
CONFIG_IP_ROUTE_MULTIPATH=y
CONFIG_IP_ROUTE_VERBOSE=y
CONFIG_IP_PNP=y
CONFIG_IP_PNP_DHCP=y
CONFIG_NET_IPIP=y
CONFIG_NET_IPGRE=y
CONFIG_NET_IPGRE_DEMUX=y
CONFIG_IP_MROUTE=y
CONFIG_IP_PIMSM_V1=y
CONFIG_IP_PIMSM_V2=y
CONFIG_SYN_COOKIES=y

# IPv6 support for Docker
CONFIG_IPV6=y
CONFIG_IP6_NF_IPTABLES=y
CONFIG_IP6_NF_FILTER=y
CONFIG_IP6_NF_TARGET_REJECT=y
CONFIG_IP6_NF_NAT=y
CONFIG_IP6_NF_TARGET_MASQUERADE=y
CONFIG_IP6_NF_MANGLE=y
CONFIG_NF_DEFRAG_IPV6=y

# Networking for containers
CONFIG_NETFILTER=y
CONFIG_NETFILTER_ADVANCED=y
CONFIG_NETFILTER_XTABLES=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_NETFILTER_XT_MATCH_IPVS=y
CONFIG_NETFILTER_XT_MARK=y
CONFIG_NETFILTER_XT_TARGET_NAT=y
CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y

CONFIG_NF_NAT=y

CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_FILTER=y
CONFIG_IP_NF_TARGET_REJECT=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_IP_NF_MANGLE=y

# Bridge networking
CONFIG_BRIDGE=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_BRIDGE_VLAN_FILTERING=y

CONFIG_VETH=y
CONFIG_VXLAN=y

# Overlay filesystem for container layers
CONFIG_OVERLAY_FS=y
CONFIG_OVERLAY_FS_REDIRECT_DIR=y
CONFIG_OVERLAY_FS_INDEX=y

# Storage drivers
CONFIG_DM_THIN_PROVISIONING=y

# Security and capabilities
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y
CONFIG_SECURITY=y
CONFIG_SECURITY_NETWORK=y
CONFIG_SECURITY_APPARMOR=y

# Limit support (ulimit, prlimit)
CONFIG_POSIX_MQUEUE=y

# VLAN support
CONFIG_VLAN_8021Q=y

# MACVLAN support
CONFIG_MACVLAN=y
CONFIG_IPVLAN=y

# IP Virtual Server for load balancing (Docker Swarm)
CONFIG_IP_VS=y
CONFIG_IP_VS_PROTO_TCP=y
CONFIG_IP_VS_PROTO_UDP=y
CONFIG_IP_VS_RR=y
CONFIG_IP_VS_WRR=y
CONFIG_IP_VS_SH=y
CONFIG_IP_VS_NFCT=y

# Netfilter connection tracking
CONFIG_NF_CONNTRACK=y
CONFIG_NF_CONNTRACK_MARK=y

# Network priority and classifiers
CONFIG_NET_CLS_CGROUP=y
CONFIG_NET_SCH_INGRESS=y
CONFIG_NET_SCHED=y

# Packet scheduling
CONFIG_NET_SCH_HTB=y

# eBPF support for modern container networking
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y
CONFIG_HAVE_EBPF_JIT=y

# Audit support for security
CONFIG_AUDIT=y

# Quota support
CONFIG_QUOTA=y
CONFIG_QUOTACTL=y

# Tmpfs/shmem support for containers
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_TMPFS_XATTR=y

# Hugetlbfs for performance
CONFIG_HUGETLBFS=y
CONFIG_HUGETLB_PAGE=y
